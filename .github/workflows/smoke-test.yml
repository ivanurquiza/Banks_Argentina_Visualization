name: Smoke test del app

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest smoke tests
        run: |
          pip install pytest
          pytest tests/ -v

      - name: Importar páginas Streamlit (compilación)
        run: |
          python -c "
          import ast
          for p in ['app/Home.py']:
              ast.parse(open(p).read())
          import os
          for f in os.listdir('app/pages'):
              ast.parse(open(f'app/pages/{f}').read())
          print('Pages parse OK')
          "
